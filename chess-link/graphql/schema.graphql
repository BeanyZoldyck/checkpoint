type Game {
  id: ID!
  status: GameStatus!
  currentFEN: String!
  currentTurn: PlayerColor!
  physicalPlayerColor: PlayerColor!
  digitalPlayerColor: PlayerColor!
  moveHistory: [String!]!
  physicalPlayerConnected: Boolean!
  digitalPlayerConnected: Boolean!
  lastImageS3Key: String
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type Move {
  id: ID!
  gameId: ID!
  from: String!
  to: String!
  piece: String!
  san: String!
  fen: String!
  playerColor: PlayerColor!
  moveNumber: Int!
  timestamp: AWSDateTime!
}

type GameEvent {
  type: GameEventType!
  gameId: ID!
  move: Move
  gameState: Game
  message: String
  timestamp: AWSDateTime!
}

enum GameStatus {
  WAITING_FOR_PLAYERS
  CALIBRATING
  ACTIVE
  PAUSED
  COMPLETED
  ERROR
}

enum PlayerColor {
  WHITE
  BLACK
}

enum GameEventType {
  MOVE_MADE
  PLAYER_CONNECTED
  PLAYER_DISCONNECTED
  GAME_STATE_UPDATED
  ERROR_OCCURRED
  CALIBRATION_COMPLETE
}

type Query {
  getCurrentGame: Game
  getGame(id: ID!): Game
}

type Mutation {
  # Connect as physical player
  connectPhysicalPlayer(playerColor: PlayerColor!): Game!
  
  # Connect as digital player  
  connectDigitalPlayer: Game!
  
  # Digital player makes a move
  makeDigitalMove(
    from: String!
    to: String!
    promotion: String
  ): Move!
  
  # Computer vision detected a physical move
  recordPhysicalMove(
    from: String!
    to: String!
    piece: String!
    fen: String!
  ): Move!
  
  # Update player connection status
  updatePlayerConnection(
    playerType: String!
    connected: Boolean!
  ): Game!
  
  # Upload board image for processing
  uploadBoardImage(
    imageData: String!
  ): String!
  
  # Complete board calibration
  completeCalibration(
    calibrationData: String!
  ): Game!
  
  # Register push token for notifications
  registerPushToken(
    playerId: ID!
    pushToken: String!
    playerColor: PlayerColor
  ): PushTokenResponse!
}

type PushTokenResponse {
  success: Boolean!
  message: String
  error: String
}

type Subscription {
  # Subscribe to the current game events
  onGameEvent: Move
    @aws_subscribe(mutations: ["makeDigitalMove", "recordPhysicalMove"])
}